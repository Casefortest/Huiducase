    html+='<div class="card" onclick="openModal('+i+')"><div class="thumb">'+(x.isVideo?'':'')+'</div><div class="info"><div class="title">'+x.name+'</div><div class="cat">'+x.category+'</div></div></div>';
  }
  gallery.innerHTML=html;
}

function openModal(i){
  current=i;
  show();
  modal.classList.add('active');
}
function closeModal(){modal.classList.remove('active')}
function show(){
  var x=filtered[current];
  if(x.isVideo){
    modalImg.style.display='none';
    modalVideo.style.display='block';
    modalVideo.src=MEDIA_URL+x.path;
  }else{
    modalVideo.style.display='none';
    modalImg.style.display='block';
    modalImg.src=MEDIA_URL+x.path;
  }
}
function prevCase(){current=(current-1+filtered.length)%filtered.length;show()}
function nextCase(){current=(current+1)%filtered.length;show()}
function filter(cat){
  if(cat==='all')return DATA;
  return DATA.filter(function(x){return x.category===cat||x.path.indexOf('/'+cat+'/')>=0});
}

document.getElementById('catBtns').addEventListener('click',function(e){
  if(e.target.classList.contains('cat-btn')){
    var btns=document.querySelectorAll('.cat-btn');
    for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
    e.target.classList.add('active');
    filtered=filter(e.target.dataset.cat);
    render(filtered);
  }
});
document.getElementById('search').addEventListener('input',function(e){
  var q=e.target.value.toLowerCase();
  render(filtered.filter(function(x){return x.name.toLowerCase().indexOf(q)>=0}));
});
render(DATA);
</script>
</body>
</html>
